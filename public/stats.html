
<!DOCTYPE html create by geyuqi>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问统计 - 作业公布站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 5px;
        }

        .header-left p {
            color: #666;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .stat-value {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #666;
            font-size: 1.1em;
        }

        .visits-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-header h2 {
            color: #333;
            font-size: 1.5em;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95em;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #5a67d8;
        }

        .visits-table {
            width: 100%;
            border-collapse: collapse;
        }

        .visits-table th,
        .visits-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .visits-table th {
            background: #f7fafc;
            color: #333;
            font-weight: bold;
        }

        .visits-table tr:hover {
            background: #f7fafc;
        }

        .device-info {
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.9em;
            color: #666;
        }

        .time-cell {
            color: #666;
            white-space: nowrap;
        }

        .ip-cell {
            color: #666;
            font-family: monospace;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #667eea;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.3);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255,255,255,0.9);
            font-size: 0.9em;
            backdrop-filter: blur(5px);
        }

        .footer-left {
            text-align: left;
        }

        .footer-right {
            text-align: right;
        }

        .footer a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
        }

        .footer a:hover {
            color: white;
            text-decoration: underline;
        }

        /* 给页面底部留出空间，避免内容被固定footer遮挡 */
        body {
            padding-bottom: 80px;
        }

        @media (max-width: 1000px) {
            .device-info {
                max-width: 200px;
            }
        }

        @media (max-width: 700px) {
            .visits-table {
                font-size: 0.85em;
            }
            
            .visits-table th,
            .visits-table td {
                padding: 10px;
            }
            
            .device-info {
                max-width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>📊 访问统计</h1>
                <p>作业公布站</p>
            </div>
            <a href="/teacher" class="back-btn">← 返回教师端</a>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="total-visits">0</div>
                <div class="stat-label">总访问次数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📱</div>
                <div class="stat-value" id="today-visits">0</div>
                <div class="stat-label">今日访问</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💻</div>
                <div class="stat-value" id="unique-devices">0</div>
                <div class="stat-label">不同设备</div>
            </div>
        </div>

        <div class="visits-section">
            <div class="section-header">
                <h2>📋 访问记录</h2>
                <button class="refresh-btn" onclick="loadStats()">🔄 刷新数据</button>
            </div>
            
            <div id="visits-content">
                <div class="empty-state">
                    <h3>加载中...</h3>
                    <p>请稍候</p>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-left">
            <a href="https://beian.miit.gov.cn/" target="_blank">备案号</a>
        </div>
        <div class="footer-right">
            <a href="-----" target="_blank"></a>
        </div>
    </div>

    <script>
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                
                document.getElementById('total-visits').textContent = stats.totalVisits;
                
                // 计算今日访问
                const today = new Date().toDateString();
                const todayVisits = stats.visits.filter(v => 
                    new Date(v.timestamp).toDateString() === today
                ).length;
                document.getElementById('today-visits').textContent = todayVisits;
                
                // 计算不同设备（简单去重）
                const uniqueDevices = new Set(stats.visits.map(v => v.userAgent.substring(0, 100)));
                document.getElementById('unique-devices').textContent = uniqueDevices.size;
                
                // 渲染访问记录
                renderVisits(stats.visits);
            } catch (error) {
                console.error('加载统计失败:', error);
                document.getElementById('visits-content').innerHTML = `
                    <div class="empty-state">
                        <h3>加载失败</h3>
                        <p>请刷新页面重试</p>
                    </div>
                `;
            }
        }
        
        function renderVisits(visits) {
            const container = document.getElementById('visits-content');
            
            if (visits.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>暂无访问记录</h3>
                        <p>等待用户访问...</p>
                    </div>
                `;
                return;
            }
            // 渲染访问记录
            container.innerHTML = `
                <table class="visits-table">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>访问时间</th>
                            <th>IP地址</th>
                            <th>设备信息</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${visits.map((visit, index) => `
                            <tr>
                                <td>${index + 1}</td>
                                <td class="time-cell">${formatDate(visit.timestamp)}</td>
                                <td class="ip-cell">${escapeHtml(visit.ip)}</td>
                                <td class="device-info" title="${escapeHtml(visit.userAgent)}">${escapeHtml(visit.userAgent)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 初始化
        loadStats();
    </script>
</body>
</html>
